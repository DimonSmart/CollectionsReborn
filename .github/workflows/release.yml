name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension package
        run: npm run package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: collections-reborn-release-package
          path: release/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release/*.zip \
            --title "Collections Reborn ${GITHUB_REF_NAME}" \
            --notes "Browser extension package for Chrome Web Store and Microsoft Edge Add-ons."
