name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run package

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload extension package artifact
        uses: actions/upload-artifact@v4
        with:
          name: collections-reborn-extension-package
          path: release/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload store assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: collections-reborn-store-assets
          path: docs/store/assets
          if-no-files-found: error
          retention-days: 14
